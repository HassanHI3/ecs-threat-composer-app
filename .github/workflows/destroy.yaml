name: Terraform Destroy

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "destroy-dev" to confirm you want to destroy DEV infrastructure'
        required: true
        type: string

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-west-2

jobs:
  destroy:
    name: Terraform Destroy Dev
    runs-on: ubuntu-latest
    environment: dev
    if: ${{ inputs.confirm == 'destroy-dev' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.CICD_ECS_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: infra
        run: terraform init

      - name: Terraform Plan Destroy
        working-directory: infra
        run: |
          terraform plan -destroy -var-file="dev.tfvars" -input=false \
            -var="ECR_REGISTRY=${{ secrets.ECR_REGISTRY }}" \
            -var="task_role_arn=${{ secrets.TASK_ROLE_ARN }}" \
            -var="execution_role_arn=${{ secrets.EXECUTION_ROLE_ARN }}"

      - name: Terraform Destroy
        working-directory: infra
        run: |
          terraform destroy -var-file="dev.tfvars" -auto-approve -input=false \
            -var="ECR_REGISTRY=${{ secrets.ECR_REGISTRY }}" \
            -var="task_role_arn=${{ secrets.TASK_ROLE_ARN }}" \
            -var="execution_role_arn=${{ secrets.EXECUTION_ROLE_ARN }}"

      - name: Destroy summary
        if: success()
        run: |
          echo "### Terraform Destroy Complete :boom:" >> $GITHUB_STEP_SUMMARY
          echo "DEV infrastructure has been destroyed." >> $GITHUB_STEP_SUMMARY