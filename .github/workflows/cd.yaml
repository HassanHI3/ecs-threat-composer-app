name: ECS Deployment

on:
  workflow_run:
    workflows: ["CI Workflow"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

# Only one deploy at a time - prevents race conditionssss
# If two builds finish back-to-back, only the latest deploy runs

concurrency:
  group: deploy-production
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read


env:
  AWS_REGION: eu-west-2                      # AWS region
  ECR_REPOSITORY: ecs-threat-composer-app     # Your ECR repository
  ECS_SERVICE: threatmod-cluster-service       # Your ECS service name
  ECS_CLUSTER: threatmod-cluster-main       # Your ECS cluster name
  ECS_TASK_DEFINITION: infra/.aws/task-definition.json  # Task definition file path
  CONTAINER_NAME: threatmod-app-container-serverless  # Name of the container in the task definition

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment: dev
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
            role-to-assume: ${{ secrets.CICD_ECS_ROLE }}
            aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Render task definition with new image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ env.ECS_TASK_DEFINITION }}
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPOSITORY }}:sha-${{ github.event.workflow_run.head_sha }}

      - name: Deploy Amazon ECS task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Post-deploy health check
        run: |
          curl --fail --silent --show-error https://tm.threatmodapp.com/health